<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For U ❤️</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      .container {
        text-align: center;
        padding: 20px;
      }

      .open {
        background: white;
        padding: 30px 50px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        cursor: pointer;
        transition: all 0.3s ease;
        animation: pulse 2s infinite;
      }

      .open:hover {
        transform: scale(1.05);
      }

      .open i {
        font-size: 50px;
        display: block;
        margin-bottom: 10px;
      }

      .open span {
        font-size: 18px;
        color: #333;
        font-weight: 600;
      }

      .card {
        display: none;
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        max-width: 500px;
        margin: 20px auto;
        animation: slideUp 0.5s ease;
      }

      .card h1 {
        color: #ff6b6b;
        margin-bottom: 20px;
      }

      .card p {
        color: #555;
        line-height: 1.8;
        white-space: pre-line;
        font-size: 16px;
      }

      .music-btn {
        margin-top: 20px;
        padding: 10px 20px;
        background: #ff6b6b;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 14px;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .heart {
        color: #ff6b6b;
        animation: beat 1s infinite;
      }

      @keyframes beat {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.2); }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Tombol Pembuka -->
      <div class="open" id="openBtn">
        <i class="heart">❤️</i>
        <span>Klik love nya</span>
      </div>

      <!-- Kartu Ucapan -->
      <div class="card" id="card">
        <h1>🎉 Happy Birthday! 🎉</h1>
        <p id="ucapanText"></p>
        <button class="music-btn" id="musicBtn">🎵 Putar Musik</button>
      </div>
    </div>

    <script>
      // Data Ucapan
      const ucapan = `Hai Chantika
      Happy Birthday! 🎂
      
      Udah lama kita gak ngobrol ya
      tiba-tiba tambah tua nih hehe 😅
      
      Maaf gak bisa ngasih kado nih
      cuma bisa ngasih ini
      
      Semoga Sehat selalu
      Happy teruuuss
      Cantik terusss
      Rezekinya selalu dilancarin
      
      Wish u All the best!
      
      Oh iya jangan banyak OVT yaa 
      inget jaga kesehatan 💪
      
      Have a nice day!
      Babay! 👋`;

      const musik = `Musik2.mp3`; // Pastikan file musik ada di folder yang sama

      // Fungsi Utama
      function galihpurnama(ucapan, musik, nomorWhatsapp, idTelegram) {
        const openBtn = document.getElementById('openBtn');
        const card = document.getElementById('card');
        const ucapanText = document.getElementById('ucapanText');
        const musicBtn = document.getElementById('musicBtn');
        const audio = new Audio(musik);

        // Tampilkan ucapan
        ucapanText.textContent = ucapan;

        // Event klik tombol buka
        openBtn.addEventListener('click', () => {
          openBtn.style.display = 'none';
          card.style.display = 'block';
          
          // Coba putar musik otomatis
          audio.play().catch(e => console.log('Autoplay blocked:', e));
        });

        // Event tombol musik
        musicBtn.addEventListener('click', () => {
          if (audio.paused) {
            audio.play();
            musicBtn.textContent = '⏸️ Pause Musik';
          } else {
            audio.pause();
            musicBtn.textContent = '🎵 Putar Musik';
          }
        });

        // Efek hati jatuh
        createHearts();
      }

      // Fungsi efek hati jatuh
      function createHearts() {
        setInterval(() => {
          const heart = document.createElement('div');
          heart.innerHTML = '❤️';
          heart.style.position = 'fixed';
          heart.style.left = Math.random() * 100 + 'vw';
          heart.style.top = '-50px';
          heart.style.fontSize = Math.random() * 20 + 20 + 'px';
          heart.style.animation = 'fall 3s linear';
          heart.style.zIndex = '9999';
          document.body.appendChild(heart);

          setTimeout(() => heart.remove(), 3000);
        }, 500);
      }

      // Tambahkan CSS animasi jatuh
      const style = document.createElement('style');
      style.textContent = `
        @keyframes fall {
          to { transform: translateY(100vh); }
        }
      `;
      document.head.appendChild(style);

      // Jalankan fungsi
      galihpurnama(ucapan, musik, '', '');
    </script>
  </body>
</html>
